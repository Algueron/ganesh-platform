additionalConfigProperties:
  - http-server.process-forwarded=true
additionalCatalogs:
  lakehouse: |-
    connector.name=iceberg
    iceberg.catalog.type=hive_metastore
    hive.metastore.uri=thrift://hive-metastore.hive.svc.cluster.local:9083
    fs.native-s3.enabled=true
    s3.endpoint=http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc.cluster.local
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key=ROOK_KEY_ID
    s3.aws-secret-key=ROOK_SECRET_KEY